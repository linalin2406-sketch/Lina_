<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Книжный портал — новости и тренды книжного рынка</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <span class="logo">📚</span>
        <div>
          <h1>Книжный портал</h1>
          <p class="tagline">Тренды детской литературы и маркетинга книг — Россия и мир</p>
        </div>
      </div>
      <button id="refresh-btn" class="refresh">Обновить сейчас</button>
    </div>
  </header>

  <nav class="tabs wrap">
    <button class="tab active" data-topic="kids">📚 Детская литература</button>
    <button class="tab" data-topic="marketing">📣 Маркетинг книг</button>
  </nav>

  <main class="wrap layout">
    <section class="content">
      <div class="controls">
        <input id="search" type="search" placeholder="Поиск по новостям…">
        <select id="source-filter">
          <option value="">Все источники</option>
        </select>
      </div>
      <p id="status" class="status"></p>
      <div id="news" class="news-grid"></div>
    </section>

    <aside class="sidebar">
      <h2>🔥 Тренды сейчас</h2>
      <p class="hint">Самые частые темы в свежих заголовках. Нажмите, чтобы отфильтровать.</p>
      <div id="trends" class="trends"></div>
    </aside>
  </main>

  <footer class="site-footer wrap">
    <p>Данные собираются автоматически из открытых RSS-лент книжных изданий.</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
